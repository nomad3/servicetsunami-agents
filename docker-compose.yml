services:
  temporal:
    image: temporalio/auto-setup:1.22.2
    restart: unless-stopped
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
      - "${TEMPORAL_WEB_PORT:-8233}:8233"
    depends_on:
      - db

  api:
    build:
      # Phase 1.5: context widened to repo root so the canonical
      # packages/cli_orchestrator/ is reachable from the Dockerfile.
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    # Bumped from docker-compose's 10s default so uvicorn can drain
    # in-flight chat requests on SIGTERM before docker SIGKILLs. Luna
    # chat turns can run 30-90s against Codex (longer when Gemini
    # quota cooldown forces a fallback chain); the prior 10s killed
    # responses mid-stream on every merge-triggered redeploy. Mirrors
    # helm/values/agentprovision-api.yaml — keep in sync per the no-
    # drift rule. See concern memory 25307912.
    stop_grace_period: 180s
    volumes:
      - ./apps/api:/app
      # Phase 1.5: read-only bind-mount of the canonical cli_orchestrator
      # package so dev hot-reload picks up edits without rebuilding the
      # image. The api/ volume mount above clobbers the COPY'd
      # /app/cli_orchestrator from the Dockerfile, so we re-mount it here.
      - ./packages/cli_orchestrator:/app/cli_orchestrator:ro
      - hf_cache:/root/.cache/huggingface
      # Per-tenant workspace storage for the dashboard Files mode.
      # Survives container rebuilds; see WORKSPACES_ROOT env in
      # apps/api/app/api/v1/workspace.py. Mirrored in Helm as a PVC
      # (helm/charts/microservice/templates/workspaces-pvc.yaml).
      - workspaces:/var/agentprovision/workspaces
      # Shared Claude Code credential volume (same one the code-worker mounts
      # at /home/codeworker/.claude). The web "Connect with Anthropic" flow
      # (apps/api/app/api/v1/claude_auth.py) runs `claude auth login` and drops
      # the resulting native .credentials.json here so the worker's interactive
      # PTY sessions use it — setup-token/-p are blocked for subscription.
      # Both containers run as uid 1000 so the api can write it. Mirrored in
      # Helm via the code-worker claude-sessions PVC.
      - claude_sessions:/home/codeworker/.claude
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - temporal
      - embedding-service
      - memory-core
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentprovision
      - MCP_SERVER_URL=http://mcp-tools:8086
      - PLATFORM_CLAUDE_CODE_TOKEN=${PLATFORM_CLAUDE_CODE_TOKEN:-}
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DISABLE_XET=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PROVIDER_COUNCIL_SAMPLE_RATE=${PROVIDER_COUNCIL_SAMPLE_RATE:-0.05}
      - EXPLORATION_MODE=${EXPLORATION_MODE:-off}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
      - EXPLORATION_RATE=${EXPLORATION_RATE:-0.0}
      - USE_MEMORY_V2=true
      - USE_MEMORY_V2_TENANT_ALLOWLIST=["752626d9-8b2c-4aa2-87ef-c458d48bd38a"]
      - EMBEDDING_SERVICE_URL=embedding-service:50051
      - MEMORY_CORE_URL=memory-core:50052
      - USE_RUST_EMBEDDING=true
      - USE_RUST_MEMORY=true
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  embedding-service:
    build:
      context: ./apps/embedding-service
      dockerfile: Dockerfile
    image: agentprovision-embedding-service
    ports:
      - "50051:50051"
    environment:
      - RUST_LOG=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  memory-core:
    build:
      context: ./apps/memory-core
      dockerfile: Dockerfile
    image: agentprovision-memory-core
    ports:
      - "50052:50052"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentprovision
      - EMBEDDING_SERVICE_URL=http://embedding-service:50051
      - RUST_LOG=info
    depends_on:
      - db
      - embedding-service
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8002}:80"
    environment:
      - NODE_ENV=development
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentprovision
    ports:
      - "${DB_PORT:-8003}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  orchestration-worker:
    build:
      # Phase 1.5: context widened to repo root.
      context: .
      dockerfile: apps/api/Dockerfile
    image: agentprovision-agents-api
    command: python -m app.workers.orchestration_worker
    volumes:
      - ./apps/api:/app
      # Phase 1.5: see api service comment above.
      - ./packages/cli_orchestrator:/app/cli_orchestrator:ro
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - temporal
      - embedding-service
      - memory-core
    environment:
      - API_BASE_URL=http://api:8000
      - MCP_SERVER_URL=http://mcp-tools:8086
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DISABLE_XET=1
      - USE_MEMORY_V2=true
      - USE_MEMORY_V2_TENANT_ALLOWLIST=["752626d9-8b2c-4aa2-87ef-c458d48bd38a"]
      - EMBEDDING_SERVICE_URL=embedding-service:50051
      - MEMORY_CORE_URL=memory-core:50052
      - USE_RUST_EMBEDDING=true
      - USE_RUST_MEMORY=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Override the api Dockerfile's HEALTHCHECK (curl /api/v1/) — this is a
    # Temporal worker, not an HTTP server, so the inherited check always failed
    # and the container has been flagged unhealthy since startup. Helm already
    # disables the probes for this service (helm/values/agentprovision-
    # orchestration-worker.yaml). `restart: unless-stopped` covers actual crashes.
    healthcheck:
      disable: true

  mcp-tools:
    build:
      context: ./apps/mcp-server
      dockerfile: Dockerfile
    command: ["python", "-m", "src.mcp_serve"]
    ports:
      - "8087:8086"
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentprovision
      - API_BASE_URL=http://api:8000
      # 4h cache for BrightLocal rank pulls (and any future MCP tool that opts in)
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    # FastMCP only exposes streaming endpoints (`/sse`, etc.) — the upstream
    # `curl -sf http://localhost:8086/sse` healthcheck times out on the long-
    # poll connection and reports unhealthy. Replace with a TCP liveness probe
    # against the listening port. Helm already disables the probes here too
    # (helm/values/agentprovision-mcp-local.yaml).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8086)); s.close()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  code-worker:
    build:
      # Phase 1.5: context widened to repo root so the canonical
      # packages/cli_orchestrator/ is reachable from the Dockerfile and
      # the worker's _is_*_credit_exhausted helpers can delegate to
      # cli_orchestrator.classify (closes I-1).
      context: .
      dockerfile: apps/code-worker/Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - API_BASE_URL=http://api:8000
      - CLAUDE_CODE_MODEL=${CLAUDE_CODE_MODEL:-sonnet}
      # Codex CLI MCP opt-in for the experimental Rust MCP client.
      # Required for SSE / streamable_http MCP servers to be honoured.
      # See apps/code-worker/workflows.py::_prepare_codex_home and
      # docs/plans/2026-05-16-codex-mcp-tool-access-fix.md.
      - CODEX_USE_RMCP_CLIENT=${CODEX_USE_RMCP_CLIENT:-true}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-ghp_placeholder}
      - OPENCODE_OLLAMA_URL=http://host.docker.internal:11434/v1
      - OPENCODE_MODEL=${OPENCODE_MODEL:-gemma4}
      - GIT_BRANCH=${GIT_BRANCH:-feat/memory-first-phase-1}
      - USE_MEMORY_V2=true
      - USE_MEMORY_V2_TENANT_ALLOWLIST=["752626d9-8b2c-4aa2-87ef-c458d48bd38a"]
      # Stream-output emitter flush cadence (plan
      # docs/plans/2026-05-16-terminal-full-cli-output.md §6.1).
      # 150 ms balances terminal-card latency against API publish QPS.
      # Mirrors helm/values/agentprovision-code-worker.yaml (review I5).
      - WORKER_STREAM_FLUSH_MS=${WORKER_STREAM_FLUSH_MS:-150}
      # Tenant workspace root (task #259 / review I2 on PR #532). Must
      # match the api service's WORKSPACES_ROOT — the api owns reads via
      # /api/v1/workspace/{tree,file}, the code-worker owns writes via
      # CLI subprocess cwd (see cli_runtime.tenant_workspace_dir). Setting
      # this explicitly here prevents silent drift if anyone changes the
      # volume mountPath without also updating cli_runtime's default.
      # Mirrored in helm/values/agentprovision-code-worker.yaml.
      - WORKSPACES_ROOT=/var/agentprovision/workspaces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/code-worker:/app
      # Phase 1.5: read-only bind-mount of the canonical cli_orchestrator
      # package. The code-worker volume above clobbers the COPY'd
      # /app/cli_orchestrator from the Dockerfile, so we re-mount it.
      - ./packages/cli_orchestrator:/app/cli_orchestrator:ro
      - claude_sessions:/home/codeworker/.claude
      # Read-only library mount so CLI subprocesses can grep/read the canonical
      # skill + agent definitions directly when the API is unreachable mid-turn.
      # The tenant-customized copies still live behind the API; only the
      # bundled (_bundled/) tier is useful from the filesystem here.
      - ./apps/api/app/skills:/library/skills:ro
      - ./apps/api/app/agents:/library/agents:ro
      # Per-tenant workspace storage shared with the api service. The api
      # owns reads via /api/v1/workspace/{tree,file}; the code-worker owns
      # writes via CLI subprocesses (claude code / codex / git clone). Both
      # services point at the same named volume so subprocess writes from
      # the worker survive container rebuilds and are visible to the api's
      # file-tree endpoints without an extra hop. Mirrored in Helm via the
      # workspaces PVC (helm/values/agentprovision-code-worker.yaml).
      - workspaces:/var/agentprovision/workspaces
    depends_on:
      - temporal
    restart: unless-stopped

  luna-client:
    build:
      context: ./apps/luna-client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "${LUNA_PORT:-8009}:80"
    depends_on:
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - api
      - web
      - luna-client
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:
  claude_sessions:
  hf_cache:
  workspaces:

