services:
  temporal:
    image: temporalio/auto-setup:1.22.2
    restart: unless-stopped
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
      - "${TEMPORAL_WEB_PORT:-8233}:8233"
    depends_on:
      - db

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./apps/api:/app
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - temporal
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
      - PLATFORM_CLAUDE_CODE_TOKEN=${PLATFORM_CLAUDE_CODE_TOKEN:-}
      - HF_HUB_ENABLE_HF_TRANSFER=0

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8002}:80"
    environment:
      - NODE_ENV=development
      - WDS_SOCKET_HOST=0.0.0.0
      - WDS_SOCKET_PORT=3000
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=servicetsunami
    ports:
      - "${DB_PORT:-8003}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  databricks-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.workers.databricks_worker
    volumes:
      - ./apps/api:/app
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - temporal
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
    restart: unless-stopped

  mcp-server:
    build:
      context: ./apps/mcp-server
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-8086}:8000"
    environment:
      - API_BASE_URL=http://api:8000
      - API_INTERNAL_KEY=${API_INTERNAL_KEY:-internal-service-key}
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
      - DATABRICKS_WAREHOUSE_ID=${DATABRICKS_WAREHOUSE_ID}
      - MCP_PORT=8000
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
    depends_on:
      - db
    restart: unless-stopped

  mcp-tools:
    build:
      context: ./apps/mcp-server
      dockerfile: Dockerfile
    command: ["python", "-m", "src.mcp_serve"]
    ports:
      - "8087:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/servicetsunami
      - MCP_API_KEY=${MCP_API_KEY:-dev_mcp_key}
      - API_BASE_URL=http://api:8000
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
    depends_on:
      - db
    restart: unless-stopped

  code-worker:
    build:
      context: ./apps/code-worker
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - API_BASE_URL=http://api:8000
      - API_INTERNAL_KEY=dev_mcp_key
      - MCP_API_KEY=dev_mcp_key
      - GITHUB_TOKEN=${GITHUB_TOKEN:-ghp_placeholder}
    volumes:
      - ./apps/code-worker:/app
      - claude_sessions:/home/codeworker/.claude
    depends_on:
      - temporal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  test-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=testdb
    ports:
      - "8004:5432"

volumes:
  db_data:
  claude_sessions:
  hf_cache:
