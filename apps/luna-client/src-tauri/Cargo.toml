[package]
name = "luna"
version = "0.1.0"
description = "Luna — AI Assistant for desktop, mobile, and IoT"
authors = ["ServiceTsunami"]
license = "MIT"
repository = "https://github.com/nomad3/servicetsunami-agents"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "luna_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-log = "2"
tauri-plugin-notification = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
