<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1628" />
    <meta
      name="description"
      content="agentprovision.com — A network of specialized AI agents running your operations. Code, sales, marketing, data, and communications specialists — coordinated automatically, sharing memory, getting smarter together."
    />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agentprovision.com/" />
    <meta property="og:title" content="agentprovision.com — A Network of AI Agents That Runs Your Business" />
    <meta property="og:description" content="Deploy a coordinated network of specialized AI agents across your operations. Each agent owns a domain. They share memory, route tasks automatically, and get smarter together." />
    <meta property="og:image" content="https://agentprovision.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://agentprovision.com/" />
    <meta name="twitter:title" content="agentprovision.com — A Network of AI Agents That Runs Your Business" />
    <meta name="twitter:description" content="Deploy a coordinated network of specialized AI agents across your operations. Each agent owns a domain. They share memory, route tasks automatically, and get smarter together." />
    <meta name="twitter:image" content="https://agentprovision.com/og-image.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="canonical" href="https://agentprovision.com/" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large" />
    <meta name="author" content="AgentProvision" />
    <meta property="og:site_name" content="AgentProvision" />
    <meta name="twitter:site" content="@agentprovision" />

    <!-- JSON-LD: Organization + SoftwareApplication. Search engines
         use these to render rich results (sitelinks, knowledge panel).
         Keep the shape conservative — extra fields can suppress
         rendering if they fail validation. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://agentprovision.com/#org",
          "name": "AgentProvision",
          "url": "https://agentprovision.com/",
          "logo": "https://agentprovision.com/logo512.png",
          "description": "A network of specialized AI agents running your operations."
        },
        {
          "@type": "WebSite",
          "@id": "https://agentprovision.com/#site",
          "url": "https://agentprovision.com/",
          "name": "AgentProvision",
          "publisher": { "@id": "https://agentprovision.com/#org" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "AgentProvision",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
        }
      ]
    }
    </script>

    <!-- Privacy-respecting analytics. Loads only when build defines
         REACT_APP_PLAUSIBLE_DOMAIN (default off — dev/preview envs
         do not ping the analytics server). The init() helper is in
         src/services/analytics.js. -->
    <title>agentprovision.com — A Network of AI Agents That Runs Your Business</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
