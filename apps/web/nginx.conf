resolver 127.0.0.11 valid=30s;

# Compression at origin so Cloudflare → origin traffic is small and the
# edge cache stores compressed bytes. text/* / application/* JS/CSS/JSON
# benefit the most; static images are already compressed.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/x-javascript
  application/json
  application/xml
  application/wasm
  image/svg+xml
  font/woff
  font/woff2;

server {
  listen 80;
  client_max_body_size 50M;

  # Proxy API requests to the API container
  location /api/ {
    set $upstream_api api:8000;
    proxy_pass http://$upstream_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
  }

  # SSE streaming endpoint — disable buffering so tokens reach the browser live
  location /api/v1/chat/sessions/ {
    set $upstream_api api:8000;
    proxy_pass http://$upstream_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;
    chunked_transfer_encoding on;
  }

  # Hashed CRA bundles — file name changes on every rebuild, so it is
  # safe to tell the browser AND Cloudflare to cache them forever.
  # `immutable` lets the browser skip the revalidation roundtrip on
  # repeat visits. cf-cache-status should flip from MISS/EXPIRED → HIT
  # for these once the new headers propagate.
  location ~* ^/static/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  # Other static asset extensions outside /static/ (favicon, manifest,
  # robots, fonts dropped at the web root). Shorter TTL — these are not
  # content-hashed so we can't bet on immutability, but a day of cache
  # is fine for the favicon / images.
  location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=86400" always;
    access_log off;
    try_files $uri =404;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    # index.html itself must never cache aggressively or users get stuck
    # on a stale shell that points at deleted bundle hashes after a
    # deploy. no-cache (NOT no-store) lets the browser revalidate via
    # ETag — typically 304s without a body transfer.
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
