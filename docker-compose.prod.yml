version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:1.22.2
    restart: always
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_SEEDS=db
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "127.0.0.1:7233:7233"
      - "127.0.0.1:8233:8233"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      # Phase 1.5: context widened to repo root so the canonical
      # packages/cli_orchestrator/ is reachable from the Dockerfile.
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - api_storage:/app/storage
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/agentprovision
      - TEMPORAL_ADDRESS=temporal:7233
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - EMBEDDING_SERVICE_URL=embedding-service:50051
      - MEMORY_CORE_URL=memory-core:50052
      - USE_RUST_EMBEDDING=true
      - USE_RUST_MEMORY=true
      - MCP_SERVER_URL=http://mcp-tools:8086
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  embedding-service:
    build:
      context: ./apps/embedding-service
      dockerfile: Dockerfile
    image: agentprovision-embedding-service:prod
    restart: always
    environment:
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  memory-core:
    build:
      context: ./apps/memory-core
      dockerfile: Dockerfile
    image: agentprovision-memory-core:prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/agentprovision
      - EMBEDDING_SERVICE_URL=http://embedding-service:50051
      - RUST_LOG=info
    depends_on:
      db:
        condition: service_healthy
      embedding-service:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8002:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  db:
    image: pgvector/pgvector:pg13
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=agentprovision
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  mcp-tools:
    build:
      context: ./apps/mcp-server
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/agentprovision
      - MCP_API_KEY=${MCP_API_KEY}
      - API_INTERNAL_KEY=${API_INTERNAL_KEY}
      - API_BASE_URL=http://api:8000
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  code-worker:
    build:
      # Phase 1.5: context widened to repo root so the canonical
      # packages/cli_orchestrator/ is reachable from the Dockerfile and
      # the worker's _is_*_credit_exhausted helpers can delegate to
      # cli_orchestrator.classify (closes I-1).
      context: .
      dockerfile: apps/code-worker/Dockerfile
    restart: always
    env_file:
      - .env.production
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - API_BASE_URL=http://api:8000
      # Stream-output emitter flush cadence — see helm values + plan
      # docs/plans/2026-05-16-terminal-full-cli-output.md §6.1
      # (review I5 — parity across helm/compose/compose.prod).
      - WORKER_STREAM_FLUSH_MS=${WORKER_STREAM_FLUSH_MS:-150}
      # Interactive Claude Code startup-chrome kill switches (root-cause fix for
      # intermittent exit-143, 2026-05-30) — disable auto-updater /
      # official-marketplace auto-install / non-essential traffic that floods
      # the PTY on a cold HOME and starves the trigger submit. Also set
      # per-subprocess in cli_executors/claude.py. Parity across
      # compose / compose.prod / helm (no drift).
      - DISABLE_AUTOUPDATER=1
      - CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
    volumes:
      - claude_sessions:/home/codeworker/.claude
    depends_on:
      - temporal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - api
      - web

volumes:
  db_data:
  claude_sessions:
  hf_cache:
  api_storage:
  n8n-data:
