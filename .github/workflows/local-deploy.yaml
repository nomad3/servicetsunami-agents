name: Local Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'apps/code-worker/**'
      - 'apps/mcp-server/**'
      - 'docker-compose.yml'
      - '.github/workflows/local-deploy.yaml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to rebuild (comma-separated: api,web,code-worker,mcp-tools,orchestration-worker,databricks-worker)'
        required: false
        default: 'all'

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: changes
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

          SERVICES=""
          echo "$CHANGED" | grep -q "apps/api/" && SERVICES="$SERVICES api orchestration-worker databricks-worker"
          echo "$CHANGED" | grep -q "apps/web/" && SERVICES="$SERVICES web"
          echo "$CHANGED" | grep -q "apps/code-worker/" && SERVICES="$SERVICES code-worker"
          echo "$CHANGED" | grep -q "apps/mcp-server/" && SERVICES="$SERVICES mcp-tools"
          echo "$CHANGED" | grep -q "docker-compose.yml" && SERVICES="api web code-worker orchestration-worker databricks-worker"

          # Default: skip mcp-tools (12GB image, 10+ min build) unless explicitly changed
          [ -z "$SERVICES" ] && SERVICES="api web code-worker orchestration-worker databricks-worker"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Deploying: $SERVICES"

      - name: Set services from dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [ "$INPUT" = "all" ]; then
            echo "services=api web code-worker mcp-tools orchestration-worker databricks-worker" >> $GITHUB_OUTPUT
          else
            echo "services=$(echo $INPUT | tr ',' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Unlock keychain
        run: security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db

      - name: Clean up Docker disk (threshold-based)
        run: |
          echo "--- Docker disk before cleanup ---"
          docker system df 2>/dev/null || true

          # Check available space in Docker VM
          AVAIL_GB=$(docker run --rm --privileged alpine df / 2>/dev/null | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available disk: ${AVAIL_GB}GB"

          # Only aggressive cleanup if below 15GB free
          if [ "${AVAIL_GB:-0}" -lt 15 ]; then
            echo "Low disk (${AVAIL_GB}GB < 15GB) — running aggressive cleanup"

            # Remove dangling images
            docker image prune -f 2>/dev/null || true

            # Remove unused images not referenced by running containers
            docker image prune -af 2>/dev/null || true

            # Clear build cache
            docker builder prune -af 2>/dev/null || true

            # Remove orphaned buildx volumes
            for vol in $(docker volume ls -q 2>/dev/null | grep buildkit); do
              if ! docker ps -q --filter "volume=$vol" 2>/dev/null | grep -q .; then
                echo "Removing orphaned buildx volume: $vol"
                docker volume rm "$vol" 2>/dev/null || true
              fi
            done
          else
            echo "Disk OK (${AVAIL_GB}GB) — only pruning dangling images"
            docker image prune -f 2>/dev/null || true
          fi

          echo "--- Docker disk after cleanup ---"
          docker system df 2>/dev/null || true

      - name: Build and deploy
        run: |
          SERVICES="${{ steps.changes.outputs.services || steps.dispatch.outputs.services }}"
          echo "Building: $SERVICES"

          cd /Users/nomade/Documents/GitHub/servicetsunami-agents

          # Build and restart only changed services
          for svc in $SERVICES; do
            echo "--- Rebuilding $svc ---"
            docker-compose up -d --build "$svc" 2>&1 | tail -3
          done

          # Workers share the API image and mount code via volumes, but
          # the Python process caches modules on start. On workflow_dispatch
          # the user may select only "api" without workers — bounce them
          # to pick up the new code. Skip if they were already rebuilt above.
          if echo "$SERVICES" | grep -q "api"; then
            for worker in orchestration-worker databricks-worker; do
              if ! echo "$SERVICES" | grep -q "$worker"; then
                echo "--- Restarting $worker (not in build list but depends on API code) ---"
                docker-compose restart "$worker" 2>&1 | tail -3
              fi
            done
          fi

          # Wait for health
          echo "--- Waiting for services to be healthy ---"
          sleep 20

          # Health check
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/auth/login 2>/dev/null || echo "000")
          echo "API status: $API_STATUS"
          if [ "$API_STATUS" = "000" ]; then
            echo "WARNING: API not responding yet, may still be starting up"
          fi

      - name: Run pending migrations
        if: contains(steps.changes.outputs.services || steps.dispatch.outputs.services, 'api') || github.event_name == 'workflow_dispatch'
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          PROJECT_DIR="/Users/nomade/Documents/GitHub/servicetsunami-agents"
          MIGRATION_DIR="$PROJECT_DIR/apps/api/migrations"

          # Create tracking table if it doesn't exist
          docker exec servicetsunami-agents-db-1 psql -U postgres servicetsunami -c \
            "CREATE TABLE IF NOT EXISTS _migrations (filename TEXT PRIMARY KEY, applied_at TIMESTAMP DEFAULT now());" 2>/dev/null

          # Run any migrations not yet applied
          APPLIED=0
          SKIPPED=0
          FAILED=0
          for f in $(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | sort); do
            BASENAME=$(basename "$f")
            ALREADY=$(docker exec servicetsunami-agents-db-1 psql -U postgres servicetsunami -tAc \
              "SELECT COUNT(*) FROM _migrations WHERE filename = '$BASENAME';" 2>/dev/null)
            if [ "$ALREADY" = "1" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "Applying: $BASENAME"
            docker cp "$f" servicetsunami-agents-db-1:/tmp/migration.sql
            if docker exec servicetsunami-agents-db-1 psql -U postgres servicetsunami -f /tmp/migration.sql; then
              docker exec servicetsunami-agents-db-1 psql -U postgres servicetsunami -c \
                "INSERT INTO _migrations (filename) VALUES ('$BASENAME') ON CONFLICT DO NOTHING;"
              APPLIED=$((APPLIED + 1))
            else
              echo "WARNING: Failed to apply $BASENAME (may already exist)"
              FAILED=$((FAILED + 1))
            fi
          done
          echo "Migrations: $APPLIED applied, $SKIPPED already applied, $FAILED failed"
          exit 0

      - name: Post-deploy cleanup
        run: |
          # Always prune dangling images after build (cheap, removes old layers)
          docker image prune -f 2>/dev/null || true

          # Report disk usage
          AVAIL_GB=$(docker run --rm --privileged alpine df / 2>/dev/null | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available disk after deploy: ${AVAIL_GB}GB"

      - name: Post-deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for svc in api web code-worker mcp-tools orchestration-worker databricks-worker; do
            STATUS=$(docker inspect --format='{{.State.Status}}' servicetsunami-agents-${svc}-1 2>/dev/null || echo "not found")
            echo "| $svc | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done
