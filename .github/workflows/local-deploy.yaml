name: Local Deploy (Rancher Desktop K8s)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'apps/code-worker/**'
      - 'apps/embedding-service/**'
      - 'apps/memory-core/**'
      - 'helm/**'
      - '.github/workflows/local-deploy.yaml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to rebuild (comma-separated: api,web,code-worker,orchestration-worker,embedding-service,memory-core or "all")'
        required: false
        default: 'all'

env:
  NAMESPACE: agentprovision
  CHART_PATH: ./helm/charts/microservice

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: changes
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          SERVICES=""
          echo "$CHANGED" | grep -q "apps/api/" && SERVICES="$SERVICES api orchestration-worker"
          echo "$CHANGED" | grep -q "apps/web/" && SERVICES="$SERVICES web"
          echo "$CHANGED" | grep -q "apps/code-worker/" && SERVICES="$SERVICES code-worker"
          echo "$CHANGED" | grep -q "apps/embedding-service/" && SERVICES="$SERVICES embedding-service"
          echo "$CHANGED" | grep -q "apps/memory-core/" && SERVICES="$SERVICES memory-core"
          echo "$CHANGED" | grep -q "helm/" && SERVICES="$SERVICES helm-only"
          [ -z "$SERVICES" ] && SERVICES="api web orchestration-worker"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Deploying: $SERVICES"

      - name: Set services from dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [ "$INPUT" = "all" ]; then
            echo "services=api web code-worker orchestration-worker embedding-service memory-core" >> $GITHUB_OUTPUT
          else
            echo "services=$(echo $INPUT | tr ',' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Unlock keychain
        run: security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db

      - name: Verify K8s context
        run: |
          kubectl config use-context docker-desktop
          kubectl get ns $NAMESPACE 2>/dev/null || kubectl create ns $NAMESPACE

      - name: Clean Docker disk (threshold-based)
        run: |
          AVAIL_GB=$(docker run --rm --privileged alpine df / 2>/dev/null | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available disk: ${AVAIL_GB:-unknown}GB"
          if [ "${AVAIL_GB:-0}" -lt 15 ]; then
            echo "Low disk — aggressive cleanup"
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
          else
            docker image prune -f 2>/dev/null || true
          fi

      # ── Build Docker Images ──────────────────────────────────
      - name: Build Docker images
        run: |
          SERVICES="${{ steps.changes.outputs.services || steps.dispatch.outputs.services }}"
          echo "Building: $SERVICES"

          build_img() {
            local name=$1 path=$2
            echo "--- Building $name ---"
            docker build -t "$name:latest" "$path" --quiet && echo "  OK: $name" || echo "  FAILED: $name"
          }

          if echo "$SERVICES" | grep -q "api"; then
            build_img agentprovision-api ./apps/api
            docker tag agentprovision-api:latest agentprovision-orchestration-worker:latest
            echo "  Tagged orchestration-worker from api"
          fi

          if echo "$SERVICES" | grep -q "web"; then build_img agentprovision-web ./apps/web; fi

          if echo "$SERVICES" | grep -q "code-worker"; then build_img agentprovision-code-worker ./apps/code-worker; fi

          if echo "$SERVICES" | grep -q "embedding-service"; then build_img agentprovision-embedding-service ./apps/embedding-service; fi

          if echo "$SERVICES" | grep -q "memory-core"; then build_img agentprovision-memory-core ./apps/memory-core; fi

      # ── Deploy via Helm ──────────────────────────────────────
      - name: Deploy services (Helm)
        run: |
          SERVICES="${{ steps.changes.outputs.services || steps.dispatch.outputs.services }}"
          NS=$NAMESPACE
          CHART=$CHART_PATH
          V=./helm/values

          deploy() {
            local name=$1 values=$2
            echo "--- Deploying $name ---"
            helm upgrade --install "$name" "$CHART" -n "$NS" $values || echo "WARN: $name deploy failed"
          }

          # Infrastructure (idempotent — always ensure running)
          deploy postgresql "-f $V/postgresql-local.yaml"
          deploy redis "-f $V/redis-local.yaml"
          deploy temporal "-f $V/temporal-local.yaml"

          # Application services (only if changed)
          if echo "$SERVICES" | grep -q "api"; then deploy api "-f $V/agentprovision-api-local.yaml"; fi
          if echo "$SERVICES" | grep -q "orchestration-worker"; then deploy orchestration-worker "-f $V/agentprovision-orchestration-worker-local.yaml"; fi
          if echo "$SERVICES" | grep -q "web"; then deploy web "-f $V/agentprovision-web-local.yaml"; fi
          if echo "$SERVICES" | grep -q "code-worker"; then deploy code-worker "-f $V/agentprovision-code-worker-local.yaml"; fi
          if echo "$SERVICES" | grep -q "embedding-service"; then deploy embedding-service "-f $V/embedding-service.yaml -f $V/embedding-service-local.yaml"; fi
          if echo "$SERVICES" | grep -q "memory-core"; then deploy memory-core "-f $V/memory-core.yaml -f $V/memory-core-local.yaml"; fi

          # Restart workers if API image changed (they share the image)
          if echo "$SERVICES" | grep -q "api"; then
            for worker in orchestration-worker; do
              if ! echo "$SERVICES" | grep -q "$worker"; then
                echo "--- Restarting $worker (depends on API image) ---"
                kubectl rollout restart deploy/$worker -n $NS 2>/dev/null || true
              fi
            done
          fi

      # ── Migrations ───────────────────────────────────────────
      - name: Run pending migrations
        if: contains(steps.changes.outputs.services || steps.dispatch.outputs.services, 'api') || github.event_name == 'workflow_dispatch'
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          NS=$NAMESPACE
          MIGRATION_DIR="./apps/api/migrations"

          # Wait for PostgreSQL pod
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            PG_POD=$(kubectl get pod -n $NS -l app.kubernetes.io/name=postgresql -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            [ -n "$PG_POD" ] && kubectl exec -n $NS "$PG_POD" -- pg_isready -U postgres 2>/dev/null | grep -q "accepting" && break
            sleep 2
          done

          PG_POD=$(kubectl get pod -n $NS -l app.kubernetes.io/name=postgresql -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -z "$PG_POD" ]; then
            echo "ERROR: PostgreSQL pod not found"
            exit 0
          fi

          # Create tracking table
          kubectl exec -n $NS "$PG_POD" -- psql -U postgres agentprovision -c \
            "CREATE TABLE IF NOT EXISTS _migrations (filename TEXT PRIMARY KEY, applied_at TIMESTAMP DEFAULT now());" 2>/dev/null

          # Apply migrations
          APPLIED=0
          SKIPPED=0
          for f in $(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | sort); do
            BASENAME=$(basename "$f")
            ALREADY=$(kubectl exec -n $NS "$PG_POD" -- psql -U postgres agentprovision -tAc \
              "SELECT COUNT(*) FROM _migrations WHERE filename = '$BASENAME';" 2>/dev/null)
            if [ "$ALREADY" = "1" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "Applying: $BASENAME"
            kubectl cp "$f" "$NS/$PG_POD:/tmp/migration.sql"
            if kubectl exec -n $NS "$PG_POD" -- psql -U postgres agentprovision -f /tmp/migration.sql 2>/dev/null; then
              kubectl exec -n $NS "$PG_POD" -- psql -U postgres agentprovision -c \
                "INSERT INTO _migrations (filename) VALUES ('$BASENAME') ON CONFLICT DO NOTHING;" 2>/dev/null
              APPLIED=$((APPLIED + 1))
            fi
          done
          echo "Migrations: $APPLIED applied, $SKIPPED already applied"
          exit 0

      # ── Cloudflare Tunnel (in-cluster) ──────────────────────
      - name: Deploy Cloudflare tunnel
        run: |
          kubectl apply -f kubernetes/cloudflared-deployment.yaml 2>/dev/null || true
          sleep 10
          TUNNEL=$(curl -s -o /dev/null -w "%{http_code}" https://agentprovision.com/api/v1/ 2>/dev/null || echo "000")
          echo "Tunnel status: $TUNNEL"

      # ── Cleanup & Summary ────────────────────────────────────
      - name: Post-deploy cleanup
        run: docker image prune -f 2>/dev/null || true

      - name: Deploy summary
        run: |
          NS=$NAMESPACE
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Ready |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          for svc in postgresql redis temporal api web orchestration-worker code-worker embedding-service memory-core; do
            POD_INFO=$(kubectl get pod -n $NS -l "app.kubernetes.io/name=$svc" --no-headers 2>/dev/null | head -1)
            STATUS=$(echo "$POD_INFO" | awk '{print $3}')
            READY=$(echo "$POD_INFO" | awk '{print $2}')
            echo "| $svc | ${STATUS:-not deployed} | ${READY:--} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          API_LOCAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/ 2>/dev/null || echo "000")
          API_TUNNEL=$(curl -s -o /dev/null -w "%{http_code}" https://agentprovision.com/api/v1/ 2>/dev/null || echo "000")
          echo "| localhost:8000 | $API_LOCAL |" >> $GITHUB_STEP_SUMMARY
          echo "| agentprovision.com | $API_TUNNEL |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm Releases" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          helm list -n $NS >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
