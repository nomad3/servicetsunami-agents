name: Luna Client — Tauri Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/luna-client/**'
      - '.github/workflows/luna-client-build.yaml'
    tags:
      - 'luna-v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/luna-client
        run: npm ci

      - name: Install Rust (if needed)
        run: |
          if ! command -v cargo &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
          rustc --version
          cargo --version

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" 2>/dev/null || true

      - name: Build Tauri (macOS ARM64)
        working-directory: apps/luna-client
        env:
          VITE_API_BASE_URL: https://agentprovision.com
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luna-macos-arm64
          path: |
            apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app
            apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
          retention-days: 30

      - name: Generate updater manifest
        if: startsWith(github.ref, 'refs/tags/luna-v')
        working-directory: apps/luna-client
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/luna-v//')
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)
          DMG_NAME=$(basename "$DMG_PATH")

          # Generate signature if signing key is available
          SIG=""
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            SIG=$(cargo tauri signer sign "$DMG_PATH" --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" 2>/dev/null | tail -1 || echo "")
          fi

          cat > latest.json << MANIFEST
          {
            "version": "$VERSION",
            "notes": "Luna $VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/nomad3/servicetsunami-agents/releases/download/${{ github.ref_name }}/$DMG_NAME"
              }
            }
          }
          MANIFEST

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/luna-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
            apps/luna-client/latest.json
          generate_release_notes: true
