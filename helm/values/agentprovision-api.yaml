# AgentProvision API Service - FastAPI Backend
nameOverride: "agentprovision-api"
fullnameOverride: "agentprovision-api"

image:
  repository: gcr.io/ai-agency-479516/agentprovision-api
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

# Deployment strategy - RollingUpdate for zero-downtime
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Bumped from k8s default 30s so uvicorn can drain in-flight chat
# requests on SIGTERM before docker SIGKILLs. Luna chat turns can
# run 30-90s against Codex (longer when Gemini quota cooldown forces
# a fallback chain); the prior default killed responses mid-stream on
# every merge-triggered redeploy. See concern memory 25307912.
terminationGracePeriodSeconds: 180

container:
  port: 8000

# Service account with Workload Identity for GCP services
serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: dev-backend-app@ai-agency-479516.iam.gserviceaccount.com

# Pod security - Python app runs as non-root
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource allocation - Production ready
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Health checks for FastAPI
livenessProbe:
  enabled: true
  httpGet:
    path: /api/v1/
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 6

readinessProbe:
  enabled: true
  httpGet:
    path: /api/v1/
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  enabled: true
  httpGet:
    path: /api/v1/
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations:
    cloud.google.com/backend-config: '{"default": "agentprovision-api-backend"}'

# BackendConfig for GCE Ingress — 300s timeout for long-running agent calls
backendConfig:
  enabled: true
  name: agentprovision-api-backend
  timeoutSec: 300

# ConfigMap with non-sensitive configuration
configMap:
  enabled: true
  data:
    ALGORITHM: "HS256"
    ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    TEMPORAL_NAMESPACE: "default"
    DEFAULT_WORKFLOW_TIMEOUT_SECONDS: "600"
    MCP_ENABLED: "true"
    LLM_MODEL: "claude-3-haiku-20240307"
    LLM_MAX_TOKENS: "4096"
    LLM_TEMPERATURE: "0.7"
    HCA_API_URL: "http://marketing-backend-microservice:3000"
    HCA_SERVICE_KEY: "hca-st-integration-key-2026-prod"
    DATA_STORAGE_PATH: "/app/storage"
    GOOGLE_REDIRECT_URI: "https://agentprovision.com/api/v1/oauth/google/callback"
    GITHUB_REDIRECT_URI: "https://agentprovision.com/api/v1/oauth/github/callback"
    LINKEDIN_REDIRECT_URI: "https://agentprovision.com/api/v1/oauth/linkedin/callback"
    # Higgsfield OAuth redirect URI — MUST match the value registered
    # in the Higgsfield OAuth client console. Without this, /start
    # returns 503. Client_id/secret are sourced from the external
    # secret block below.
    HIGGSFIELD_OAUTH_REDIRECT_URI: "https://higgsfield.ai/cli/authcode"
    # Belt-and-suspenders for N5-3 / B6-1: even though the
    # `Settings.ENVIRONMENT` field defaults to "production"
    # (fail-closed), set it explicitly here so the demo-seed gate in
    # init_db.py can never run silently against this cluster — and
    # so the value is visible in `kubectl describe configmap`.
    ENVIRONMENT: "production"
    # Transactional email (password recovery, invitations).
    # EMAIL_SMTP_HOST + USERNAME + PASSWORD are pulled from the
    # external secret (below). Non-sensitive defaults live here so a
    # deploy that forgets the secret hooks falls back to log-only
    # rather than crashing. Set EMAIL_SMTP_HOST in the secret to
    # activate real delivery; leave unset to keep the log-only stub.
    EMAIL_SMTP_PORT: "587"
    EMAIL_SMTP_USE_TLS: "true"
    EMAIL_FROM: "noreply@agentprovision.com"
    EMAIL_FROM_NAME: "AgentProvision"

# External Secrets - pulls from GCP Secret Manager
externalSecret:
  enabled: true
  refreshInterval: 1m
  secretStoreRef:
    name: gcpsm-secret-store
    kind: SecretStore
  target:
    name: agentprovision-api-secret
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: agentprovision-secret-key
    - secretKey: DATABASE_URL
      remoteRef:
        key: agentprovision-database-url
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: agentprovision-anthropic-api-key
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: agentprovision-google-api-key
    - secretKey: MCP_API_KEY
      remoteRef:
        key: agentprovision-mcp-api-key
    - secretKey: API_INTERNAL_KEY
      remoteRef:
        key: agentprovision-api-internal-key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: agentprovision-encryption-key
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: agentprovision-google-oauth-client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: agentprovision-google-oauth-client-secret
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: agentprovision-github-oauth-client-id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: agentprovision-github-oauth-client-secret
    - secretKey: LINKEDIN_CLIENT_ID
      remoteRef:
        key: agentprovision-linkedin-oauth-client-id
    - secretKey: LINKEDIN_CLIENT_SECRET
      remoteRef:
        key: agentprovision-linkedin-oauth-client-secret
    # Higgsfield OAuth client (CLI integration catalog Wave 1a, #270).
    # BYO-account model — register a Higgsfield OAuth client for the
    # AgentProvision deployment and seed these two GCP Secret Manager
    # entries before the chart syncs, otherwise the /start route returns
    # 503 with an actionable detail.
    - secretKey: HIGGSFIELD_OAUTH_CLIENT_ID
      remoteRef:
        key: agentprovision-higgsfield-oauth-client-id
    - secretKey: HIGGSFIELD_OAUTH_CLIENT_SECRET
      remoteRef:
        key: agentprovision-higgsfield-oauth-client-secret
    # Transactional email relay credentials. Provisioner: create
    # these three GCP Secret Manager entries with your SMTP provider
    # creds (SendGrid api-key / Postmark server-token / SES SMTP
    # creds / Mailgun smtp / etc) before merging the PR that ships
    # this block, otherwise external secret sync will spin on missing
    # remote keys. Leave EMAIL_SMTP_HOST set to empty string in
    # Secret Manager to keep the API in log-only mode (no delivery).
    - secretKey: EMAIL_SMTP_HOST
      remoteRef:
        key: agentprovision-email-smtp-host
    - secretKey: EMAIL_SMTP_USERNAME
      remoteRef:
        key: agentprovision-email-smtp-username
    - secretKey: EMAIL_SMTP_PASSWORD
      remoteRef:
        key: agentprovision-email-smtp-password

# Additional environment variables
env:
  - name: TEMPORAL_ADDRESS
    value: "temporal:7233"
  # Kill-switch (2026-06-01): skip the per-tenant monitor auto-launch on API
  # startup (startup_proactive_workflows) — they starved the orchestration queue.
  # "1" while monitors are reworked onto a dedicated queue; flip to "0" to re-enable.
  - name: DISABLE_MONITOR_CONTINUE_AS_NEW
    value: "1"
  # MCP_SERVER_URL: was pointing at the deprecated `mcp-server:8000`
  # (the old Databricks/Playwright server, removed per CLAUDE.md).
  # Point it at the live FastMCP service so any legacy fallback reaches
  # the right place.
  - name: MCP_SERVER_URL
    value: "http://agentprovision-mcp:80"
  - name: MCP_TOOLS_URL
    value: "http://agentprovision-mcp:80"
  # PR #514 / B3: curated platform-docs surface for the dashboard
  # Files-mode "platform" scope. NEVER point this at /app — it would
  # expose source + secrets via the workspace API. The image copies
  # repo /docs into /opt/agentprovision/platform-docs (see Dockerfile).
  - name: PLATFORM_DOCS_ROOT
    value: "/opt/agentprovision/platform-docs"
  # PR #514 / B2: tenant workspace root (mirrors docker-compose).
  - name: WORKSPACES_ROOT
    value: "/var/agentprovision/workspaces"

# Horizontal Pod Autoscaler - Enable for production
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget - Ensure availability during maintenance
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Persistent storage for datasets
persistence:
  enabled: true
  storageClass: standard-rwo
  accessModes:
    - ReadWriteOnce
  size: 50Gi

# Per-tenant workspace storage for the dashboard Files mode (PR #514).
# Mounted at /var/agentprovision/workspaces; matches WORKSPACES_ROOT
# default in apps/api/app/api/v1/workspace.py and the named volume in
# docker-compose.yml.
#
# Task #247: the volume is now shared with the code-worker deployment
# so CLI subprocesses (Claude Code / Codex / `alpha workspace clone`)
# can write into the same tree the api reads from. ReadWriteMany is
# required for the cross-pod fan-out; the code-worker values file
# mirrors this block so both PVCs resolve to the same Filestore mount
# in prod and to the same docker-compose named volume in dev.
#
# storageClass is intentionally empty: the operator MUST set it to a
# cluster-appropriate RWX class before applying. Known values:
#   - GKE Filestore: `standard-rwx`
#   - EKS:           `efs-sc`
#   - AKS:           `azurefile-csi-premium`
# Local docker-compose ignores this entirely.
workspaces:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteMany
  size: 10Gi
  mountPath: /var/agentprovision/workspaces

# Temporary directories
tmpDirs:
  - /tmp

# Init container to wait for dependencies
initContainers:
  - name: wait-for-db
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Waiting for database..."; sleep 10']
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

# Cloud SQL Proxy sidecar for secure database connection
extraContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
    args:
      - "--private-ip"
      - "--structured-logs"
      - "--port=5432"
      - "--http-port=9090"
      - "ai-agency-479516:us-central1:dev-postgres-instance"
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# GKE Health Check Policy
healthCheckPolicy:
  enabled: true
  config:
    type: HTTP
    httpHealthCheck:
      port: 8000
      requestPath: /api/v1/

# Disable HTTPRoute and individual Ingress - using shared Ingress
httpRoute:
  enabled: false

# Individual Ingress disabled - using shared kubernetes/ingress.yaml
ingress:
  enabled: false

# Managed Certificate disabled - using shared certificate
managedCertificate:
  enabled: false

# Phase 3 — Prometheus ServiceMonitor for /api/v1/metrics scrape.
# Internal-key gated; the scraper config injects the X-Internal-Key
# header from the agentprovision-api-internal-key secret.
serviceMonitor:
  enabled: true
  interval: 30s
  path: /api/v1/metrics
  scheme: http
  bearerTokenSecret:
    name: agentprovision-api-secret
    key: API_INTERNAL_KEY
  # The chart base wires this into a HTTPHeaders block. If the
  # rendered ServiceMonitor needs a static X-Internal-Key header
  # instead of a bearer, set headers manually here.
  headers:
    - name: X-Internal-Key
      valueFrom:
        secretKeyRef:
          name: agentprovision-api-secret
          key: API_INTERNAL_KEY
  labels:
    app: agentprovision-api
    role: cli-orchestrator-metrics
