# AgentProvision Code Worker - Claude Code CLI Temporal Worker
nameOverride: "agentprovision-code-worker"
fullnameOverride: "agentprovision-code-worker"

image:
  repository: gcr.io/ai-agency-479516/agentprovision-code-worker
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

# Deployment strategy - RollingUpdate
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

container:
  port: 8000
  command:
    - /app/entrypoint.sh

# Service account with Workload Identity
serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: dev-backend-app@ai-agency-479516.iam.gserviceaccount.com

# Pod security — relaxed for git + Claude Code CLI
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Resources — Claude Code needs more memory than typical workers
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Health checks - worker doesn't serve HTTP, use exec probe to check process
livenessProbe:
  enabled: true
  exec:
    command:
      - pgrep
      - -f
      - "python.*worker.py"
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  enabled: true
  exec:
    command:
      - pgrep
      - -f
      - "python.*worker.py"
  initialDelaySeconds: 15
  periodSeconds: 30

# Service not needed for worker
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ConfigMap with non-sensitive configuration
configMap:
  enabled: true
  data:
    TEMPORAL_NAMESPACE: "default"
    API_BASE_URL: "http://agentprovision-api"

# External Secrets — GitHub token + API internal key only (no DB access)
externalSecret:
  enabled: true
  refreshInterval: 1m
  secretStoreRef:
    name: gcpsm-secret-store
    kind: SecretStore
  target:
    name: agentprovision-code-worker-secret
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: agentprovision-github-token
    - secretKey: API_INTERNAL_KEY
      remoteRef:
        key: agentprovision-api-internal-key

# Additional environment variables
env:
  - name: TEMPORAL_ADDRESS
    value: "temporal:7233"
  - name: CLAUDE_CODE_MODEL
    value: "sonnet"
  # Codex CLI MCP opt-in: enable the experimental Rust MCP client so
  # SSE / streamable_http entries in config.toml are honoured. Default
  # "true"; flip to "false" via Helm override to disable the rmcp path
  # without a code revert. See workflows.py::_prepare_codex_home and
  # docs/plans/2026-05-16-codex-mcp-tool-access-fix.md.
  - name: CODEX_USE_RMCP_CLIENT
    value: "true"
  # Stream-output emitter flush cadence (plan
  # docs/plans/2026-05-16-terminal-full-cli-output.md §6.1). 150 ms
  # balances terminal-card latency against API publish QPS. Optional;
  # the worker defaults to the same value if unset.
  - name: WORKER_STREAM_FLUSH_MS
    value: "150"
  # Tenant workspace root (task #259 / review I2 on PR #532). Must match
  # the api chart's WORKSPACES_ROOT value (helm/values/agentprovision-
  # api.yaml). The api owns reads via /api/v1/workspace/{tree,file}, the
  # code-worker owns writes via CLI subprocess cwd
  # (apps/code-worker/cli_runtime.py::tenant_workspace_dir). Setting this
  # explicitly prevents silent drift if anyone retunes ``workspaces.mountPath``
  # below without also updating cli_runtime's default constant.
  # Mirrored in docker-compose.yml.
  - name: WORKSPACES_ROOT
    value: "/var/agentprovision/workspaces"
  # Interactive Claude Code startup-chrome kill switches (root-cause fix for
  # intermittent exit-143, 2026-05-30). On a cold/perturbed worker HOME the
  # launch floods the PTY with auto-updater / official-marketplace auto-install
  # / telemetry chrome that never quiets, starving the trigger submit. Disabling
  # them at the source keeps the REPL quiet so the runner submits promptly.
  # Honoured by Claude Code v2.1.x. Also set per-subprocess in
  # cli_executors/claude.py; these worker-level defaults cover the deployed
  # worker even if that code path is bypassed. Mirrored in docker-compose.yml.
  - name: DISABLE_AUTOUPDATER
    value: "1"
  - name: CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL
    value: "1"
  - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
    value: "1"

# No autoscaling — single instance
autoscaling:
  enabled: false

# Writable dirs for git + Claude Code
tmpDirs:
  - /tmp
  - /workspace
  - /home/codeworker

# Per-tenant workspace storage shared with the api service. The api
# reads files via /api/v1/workspace/{tree,file}; the code-worker writes
# files via CLI subprocesses (Claude Code / Codex / `git clone` from
# `alpha workspace clone`). Both deployments mount the same PVC at the
# same path so subprocess writes are immediately visible to the file-
# tree endpoints. ReadWriteMany is required because the api and code-
# worker run as separate pods. The `existingClaim` setting below points
# this deployment at the api chart's PVC — the api chart owns the
# `storageClass` choice (intentionally empty default; operator sets
# `standard-rwx` for GKE, `efs-sc` for EKS, `azurefile-csi-premium`
# for AKS, etc).
#
# Mirrored in docker-compose.yml — the code-worker service mounts the
# shared `workspaces` named volume at the same path.
workspaces:
  enabled: true
  # Share the api chart's PVC instead of creating a second one. The api
  # chart owns provisioning (size + storageClass); we just mount it.
  # `agentprovision-api` is the fullnameOverride in
  # helm/values/agentprovision-api.yaml, so its workspaces PVC name is
  # `agentprovision-api-workspaces`.
  existingClaim: agentprovision-api-workspaces
  mountPath: /var/agentprovision/workspaces

# Init container to wait for Temporal
initContainers:
  - name: wait-for-temporal
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Waiting for Temporal..."; sleep 15']
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

# No Cloud SQL proxy — code worker doesn't access the database
# No HTTPRoute — internal service only
httpRoute:
  enabled: false
