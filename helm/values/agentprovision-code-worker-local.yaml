# AgentProvision Code Worker - Local Development
nameOverride: "code-worker"
fullnameOverride: "code-worker"

image:
  repository: agentprovision-code-worker
  tag: latest
  pullPolicy: Never

replicaCount: 1

container:
  port: 8000
  command:
    - /app/entrypoint.sh

# Worker doesn't serve HTTP — disable health probes
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false

# Resource allocation
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ConfigMap
configMap:
  enabled: true
  data:
    TEMPORAL_NAMESPACE: "default"
    API_BASE_URL: "http://api"
    CLAUDE_CODE_MODEL: "sonnet"
    OPENCODE_OLLAMA_URL: "http://host.docker.internal:11434/v1"
    OPENCODE_MODEL: "gemma4"
    GIT_BRANCH: "main"
    USE_MEMORY_V2: "true"

# Secrets: code-worker-secrets (GITHUB_TOKEN) + api-secrets (GOOGLE_CLIENT_ID/SECRET, ENCRYPTION_KEY)
envFrom:
  configMapRef: []
  secretRef:
    - code-worker-secrets
    - api-secrets

# Disable GKE specifics
externalSecret:
  enabled: false
persistence:
  enabled: false
tmpDirs:
  - /tmp
  - /workspace
  - /home/codeworker
