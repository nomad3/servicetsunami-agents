# AgentProvision Code Worker - Local Development
nameOverride: "code-worker"
fullnameOverride: "code-worker"

image:
  repository: agentprovision-code-worker
  tag: latest
  pullPolicy: Never

replicaCount: 1

container:
  port: 8000
  command:
    - /app/entrypoint.sh

# Worker doesn't serve HTTP — disable health probes
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false

# Resource allocation
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ConfigMap
configMap:
  enabled: true
  data:
    TEMPORAL_NAMESPACE: "default"
    API_BASE_URL: "http://api"
    CLAUDE_CODE_MODEL: "sonnet"
    # Codex CLI MCP opt-in (see workflows.py::_prepare_codex_home).
    # Set "false" to disable the rmcp_client path.
    CODEX_USE_RMCP_CLIENT: "true"
    OPENCODE_OLLAMA_URL: "http://host.docker.internal:11434/v1"
    OPENCODE_MODEL: "gemma4"
    GIT_BRANCH: "main"
    USE_MEMORY_V2: "true"
    # Interactive Claude Code startup-chrome kill switches (root-cause fix for
    # intermittent exit-143, 2026-05-30). Disable the auto-updater /
    # official-marketplace auto-install / non-essential traffic that floods the
    # PTY on a cold HOME and starves the trigger submit. Honoured by Claude Code
    # v2.1.x; also set per-subprocess in cli_executors/claude.py. Mirrored in
    # docker-compose.yml + helm/values/agentprovision-code-worker.yaml.
    DISABLE_AUTOUPDATER: "1"
    CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

# Secrets: code-worker-secrets (GITHUB_TOKEN) + api-secrets (GOOGLE_CLIENT_ID/SECRET, ENCRYPTION_KEY)
envFrom:
  configMapRef: []
  secretRef:
    - code-worker-secrets
    - api-secrets

# Disable GKE specifics
externalSecret:
  enabled: false
persistence:
  enabled: false
tmpDirs:
  - /tmp
  - /workspace
  - /home/codeworker
