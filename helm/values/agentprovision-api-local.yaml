# AgentProvision API Service - Local Development
nameOverride: "api"
fullnameOverride: "api"

image:
  repository: agentprovision-api
  tag: latest
  pullPolicy: Never

replicaCount: 1

container:
  port: 8000

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Needs write for local storage/logs
  capabilities:
    drop:
      - ALL

# Resource allocation
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /api/v1/
    port: 8000
  initialDelaySeconds: 30
readinessProbe:
  enabled: true
  httpGet:
    path: /api/v1/
    port: 8000
  initialDelaySeconds: 15

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ConfigMap
configMap:
  enabled: true
  data:
    ALGORITHM: "HS256"
    TEMPORAL_NAMESPACE: "default"
    MCP_ENABLED: "true"
    USE_MEMORY_V2: "true"
    USE_RUST_EMBEDDING: "true"
    USE_RUST_MEMORY: "false"
    MEMORY_DUAL_READ: "true"
    EMBEDDING_SERVICE_URL: "embedding-service:50051"
    MEMORY_CORE_URL: "memory-core:50052"
    DATABASE_URL: "postgresql://postgres:postgres@postgresql:5432/agentprovision"
    TEMPORAL_ADDRESS: "temporal:7233"

# Load secrets from k8s secret (created from apps/api/.env)
envFrom:
  configMapRef: []
  secretRef:
    - api-secrets

# Disable GKE specifics
externalSecret:
  enabled: false
backendConfig:
  enabled: false
healthCheckPolicy:
  enabled: false
ingress:
  enabled: false
managedCertificate:
  enabled: false
cloudSqlProxy:
  enabled: false
extraContainers: []

# Local persistence for storage
persistence:
  enabled: true
  storageClass: local-path
  size: 5Gi
  mountPath: /app/storage

# API secrets — defaults from config.py work for local dev
env:
  - name: SECRET_KEY
    value: "local-dev-secret-key-change-in-production"
  - name: MCP_API_KEY
    value: "dev_mcp_key"
  - name: API_INTERNAL_KEY
    value: "internal-service-key"
  # MCP server decommissioned — tools are FastMCP-based inside the API
  - name: OLLAMA_BASE_URL
    value: "http://host.docker.internal:11434"
