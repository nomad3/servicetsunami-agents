tunnel: a6b55a7a-dccd-42bc-b1ef-3ca8014560b5
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # ── Block internal service-to-service routes from the public internet.
  # Endpoints under /api/v1/*/internal/* are gated only by X-Internal-Key,
  # which is shared with code-worker, mcp-tools, and the orchestration
  # worker. If that key ever leaked, the entire admin surface (delegate
  # to agent, update skills, library revisions audit, agent config patch)
  # would be reachable from anywhere. Cloudflare returns 404 before the
  # request hits the api container; legitimate in-cluster callers go
  # directly to http://api:8000 and bypass cloudflared, so they're
  # unaffected.
  - hostname: agentprovision.com
    path: ^/api/.+/internal($|/.*)$
    service: http_status:404
  - hostname: luna.agentprovision.com
    path: ^/api/.+/internal($|/.*)$
    service: http_status:404

  # API routes
  - hostname: agentprovision.com
    path: /api/*
    service: http://api:8000
  - hostname: luna.agentprovision.com
    path: /api/*
    service: http://api:8000

  # PR-D-3 install one-liners. agentprovision.com/install.{sh,ps1} must
  # land on the API's static-file router, NOT the SPA. Without these
  # rules cloudflared sends them through the catch-all to web nginx and
  # `curl -fsSL https://agentprovision.com/install.sh | sh` pipes HTML
  # into a shell. Anchored regex so /install.sh matches exactly.
  - hostname: agentprovision.com
    path: ^/install\.sh$
    service: http://api:8000
  - hostname: agentprovision.com
    path: ^/install\.ps1$
    service: http://api:8000

  # Luna PWA client
  - hostname: luna.agentprovision.com
    service: http://luna-client:80

  # alpha CLI landing — dedicated subdomain pointing the SPA at the
  # /alpha route. React Router resolves it client-side; the catch-all
  # on the SPA's nginx layer serves index.html for unknown paths so
  # a direct hit to https://alpha.agentprovision.com/ still renders.
  # Add a path rewrite if we ever want the subdomain root to land on
  # /alpha without a redirect — for now the SPA's root handles it.
  - hostname: alpha.agentprovision.com
    service: http://web:80

  # vet practice-OS landing — dedicated subdomain pointing the SPA at
  # the /vet route. Same mechanism as the alpha block above: React
  # Router's hostname-sniff renders VetLandingPage at the root and the
  # SPA nginx catch-all serves index.html for any direct path hit.
  # KEEP IN SYNC with kubernetes/cloudflared-deployment.yaml.
  - hostname: vet.agentprovision.com
    service: http://web:80

  # Web SPA
  - hostname: agentprovision.com
    service: http://web:80

  # Reject everything else
  - service: http_status:404
