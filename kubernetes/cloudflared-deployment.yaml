apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: agentprovision
data:
  config.yml: |
    tunnel: a6b55a7a-dccd-42bc-b1ef-3ca8014560b5
    credentials-file: /etc/cloudflared/credentials.json

    ingress:
      # Block /api/v1/*/internal/* from the public internet — those
      # routes are gated only by X-Internal-Key (shared with code-worker,
      # mcp-tools, and the orchestration worker). In-cluster callers go
      # directly to http://api:8000 and bypass cloudflared, so they're
      # unaffected.
      - hostname: agentprovision.com
        path: ^/api/.+/internal($|/.*)$
        service: http_status:404
      - hostname: luna.agentprovision.com
        path: ^/api/.+/internal($|/.*)$
        service: http_status:404

      - hostname: agentprovision.com
        path: /api/*
        service: http://api:8000
      - hostname: luna.agentprovision.com
        path: /api/*
        service: http://api:8000
      - hostname: luna.agentprovision.com
        service: http://luna-client:80
      - hostname: agentprovision.com
        service: http://web:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: agentprovision
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --config
            - /etc/cloudflared/config.yml
            - run
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yml
              subPath: config.yml
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-creds
